<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta

      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Home</title>
    <link

      integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
      crossorigin="anonymous"
    />
    <style>
        .my-footer {
            height: 5em;
            background-color: #3d3d3d;
            padding: 1em;
            margin-top: 1.5em;
            color: #FFFFFF;
            font-size: 80%;
        }
        .room-image {
          max-width: 50%;
        }
    </style>
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">Navbar</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="index.html">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="about.html">About</a>
              </li>
              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle"
                  href="#"
                  id="navbarDropdownMenuLink"
                  role="button"
                  data-toggle="dropdown" 
                  aria-haspopup="true" 
                  aria-expanded="false"
                >
                  Rooms
                </a>
                <div class="dropdown-menu" aria-labelledby="navbarDropdown">
                    <a class="dropdown-item" href="generals.html"
                      >General's Quarters</a
                    >
                    <a class="dropdown-item"  href="majors.html"
                      >Major's Suits</a
                    >
                </div>
              </li>
              <li class="nav-item">
                <a
                  class="nav-link"
                  href="reservation.html"
                  tabindex="-1"
                  aria-disabled="true"
                  >Book Now</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link"
                  href="/contact"
                  tabindex="-1"
                  aria-disabled="true"
                  >Contact</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
      <div class="container">
          <div class="row">
            <div class="col-md-3"></div>
            <div class="col-md-6">
              <h1>Search for Availability</h1>

              <form action="reservation.html" method="GET">
                <div class="form-row">
                    <div class="col">
                        <div class="form-group">
                            <label for="start_date">Start</label>
                            <input required type="date" class="form-control" id="start_date" name="start_date" aria-describedby="stateDateHelp" placeholder="Start Date">
                            <small id="emailHelp" class="form-text text-muted">Enter your starting date in the form of YYYY-MM-DD.</small>
                        </div>
                    </div>
                    
                    <div class="col">
                        <div class="form-group">
                            <label for="end_date">End</label>
                            <input required type="date" class="form-control" id="end_date" name="end_date" aria-describedby="endDateHelp" placeholder="End Date">
                            <small id="emailHelp" class="form-text text-muted">Enter your ending date in the form of YYYY-MM-DD.</small>
                        </div>
                    </div>
                    
                </div>             
                
                  
                <button type="submit" class="btn btn-primary ">Search Availability</button>
              </form>
            </div>
          </div>
      </div>
      <div class="row my-footer">
        <div class="col">
            Left
        </div>
        <div class="col">
            Middle
        </div>
        <div class="col">
            Right
        </div>
      </div>
    <script
      src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
      integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"
      integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"
      integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
