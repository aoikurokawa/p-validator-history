<!DOCTYPE html>

            aria-label="Toggle navigation"

            <span class="navbar-toggler-icon"></span>

          <div class="collapse navbar-collapse" id="navbarSupportedContent">

                    >
                  </li>
                </ul>
              </li>
              <li class="nav-item">
                <a
                  class="nav-link"
                  href="/contact"
                  tabindex="-1"
                  aria-disabled="true"

            <img class="d-block w-100" src="..." alt="First slide" />

          <div class="carousel-item">
